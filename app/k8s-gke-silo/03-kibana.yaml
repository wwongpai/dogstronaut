# Kibana — connects to Elasticsearch, exposed via LoadBalancer (restricted to user IP)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: observability-silo
  labels:
    app: kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.13.4
          ports:
            - containerPort: 5601
          env:
            - name: ELASTICSEARCH_HOSTS
              value: "http://elasticsearch.observability-silo.svc.cluster.local:9200"
            - name: XPACK_SECURITY_ENABLED
              value: "false"
            - name: XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY
              value: "dogstronaut-kibana-demo-key-32chars"
            - name: SERVER_PUBLICBASEURL
              value: "http://localhost:5601"
            - name: TELEMETRY_ENABLED
              value: "false"
            - name: XPACK_BRANDING_LOGO_DEFAULTURL
              value: "data:image/png;base64,"
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: observability-silo
  labels:
    app: kibana
spec:
  type: LoadBalancer
  loadBalancerSourceRanges:
    # Replace with the public IP(s) that should be allowed to reach Kibana.
    # Default is locked down — open only the IPs you want to demo from.
    - "0.0.0.0/0"
  selector:
    app: kibana
  ports:
    - port: 5601
      targetPort: 5601
      protocol: TCP
