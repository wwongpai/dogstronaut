apiVersion: batch/v1
kind: CronJob
metadata:
  name: chaos-enable-errors
  namespace: dogstronaut
  labels:
    app: chaos-scheduler
spec:
  # 1:00 PM Bangkok time (ICT, UTC+7) = 06:00 UTC
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: chaos-scheduler
            chaos-mode: error
        spec:
          restartPolicy: OnFailure
          containers:
            - name: chaos-scheduler
              image: wwongpai/dogstronaut-chaos-scheduler:v2
              imagePullPolicy: Always
              args: ["error"]
              resources:
                requests:
                  memory: "32Mi"
                  cpu: "50m"
                limits:
                  memory: "64Mi"
                  cpu: "100m"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: chaos-reset-normal
  namespace: dogstronaut
  labels:
    app: chaos-scheduler
spec:
  # 6:00 PM Bangkok time (ICT, UTC+7) = 11:00 UTC
  schedule: "0 11 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: chaos-scheduler
            chaos-mode: normal
        spec:
          restartPolicy: OnFailure
          containers:
            - name: chaos-scheduler
              image: wwongpai/dogstronaut-chaos-scheduler:v2
              imagePullPolicy: Always
              args: ["normal"]
              resources:
                requests:
                  memory: "32Mi"
                  cpu: "50m"
                limits:
                  memory: "64Mi"
                  cpu: "100m"
