---
# seat-check-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seat-check-service
  namespace: dogstronaut
  labels:
    app: seat-check-service
    tags.datadoghq.com/env: demo
    tags.datadoghq.com/service: dogstronaut-seat-check
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seat-check-service
  template:
    metadata:
      labels:
        app: seat-check-service
        tags.datadoghq.com/env: demo
        tags.datadoghq.com/service: dogstronaut-seat-check
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        ad.datadoghq.com/seat-check-service.logs: '[{"source":"nodejs","service":"dogstronaut-seat-check"}]'
    spec:
      containers:
        - name: seat-check-service
          image: wwongpai/dogstronaut-seat-check:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 4005
          env:
            - name: NODE_ENV
              value: "demo"
            - name: PORT
              value: "4005"
            - name: DD_SERVICE
              value: "dogstronaut-seat-check"
            - name: DD_ENV
              value: "demo"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=demo"
            - name: DD_VERSION
              value: "1.0.0"
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DD_PROFILING_ENABLED
              value: "true"
            - name: DD_TRACE_SAMPLE_RATE
              value: "1"
            - name: DD_TRACE_AGENT_URL
              value: "http://$(DD_AGENT_HOST):8126"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(DD_AGENT_HOST):4318"
          readinessProbe:
            httpGet:
              path: /health
              port: 4005
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4005
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: seat-check-service
  namespace: dogstronaut
  labels:
    app: seat-check-service
spec:
  type: ClusterIP
  selector:
    app: seat-check-service
  ports:
    - port: 4005
      targetPort: 4005
