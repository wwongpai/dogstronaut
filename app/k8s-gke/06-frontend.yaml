apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: dogstronaut
  labels:
    app: frontend
    tags.datadoghq.com/env: demo
    tags.datadoghq.com/service: dogstronaut-frontend
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tags.datadoghq.com/env: demo
        tags.datadoghq.com/service: dogstronaut-frontend
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        ad.datadoghq.com/frontend.logs: '[{"source":"nginx","service":"dogstronaut-frontend"}]'
    spec:
      containers:
        - name: frontend
          image: wwongpai/dogstronaut-frontend:v20
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: DD_SERVICE
              value: "dogstronaut-frontend"
            - name: DD_ENV
              value: "demo"
            - name: DD_VERSION
              value: "1.0.0"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: dogstronaut
  labels:
    app: frontend
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
